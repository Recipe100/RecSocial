<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:#F0D080;--pink:#E8547A;--pink2:#F7A8BB;
  --bg:#0D0B14;--s1:#16131F;--s2:#1E1A2E;--s3:#262040;--s4:#2E2848;
  --txt:#F5F0E8;--txt2:#B8AFCC;--txt3:#7A7090;
  --green:#4CAF82;--purple:#9B6FE0;--amber:#E09B2F;
  --glow:rgba(201,168,76,0.25);--pinkglow:rgba(232,84,122,0.3);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* HERO */
.hero{text-align:center;padding:2.5rem 1rem 1rem;position:relative}
.hero-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.15}
.orb1{width:500px;height:300px;background:radial-gradient(circle,#C9A84C,transparent);top:-80px;left:50%;transform:translateX(-50%)}
.orb2{width:300px;height:300px;background:radial-gradient(circle,#9B6FE0,transparent);top:0;left:10%}
.orb3{width:300px;height:300px;background:radial-gradient(circle,#E8547A,transparent);top:0;right:10%}
.logo{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,7vw,4rem);letter-spacing:.05em;position:relative}
.logo-g{background:linear-gradient(135deg,#C9A84C 0%,#F0D080 40%,#C9A84C 60%,#E09B2F 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-d{font-style:italic;background:linear-gradient(135deg,#F7A8BB,#E8547A,#F7A8BB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:.75rem;color:var(--txt3);letter-spacing:.2em;text-transform:uppercase;margin-top:.4rem}

/* STEPS */
.steps{display:flex;justify-content:center;gap:6px;padding:.8rem;align-items:center}
.step-dot{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--txt3);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--txt3);transition:all .35s;position:relative}
.step-dot.done{background:linear-gradient(135deg,var(--gold),var(--amber));border-color:transparent;color:#1a1000;font-weight:700;box-shadow:0 0 16px var(--glow)}
.step-dot.active{border-color:var(--gold);color:var(--gold);box-shadow:0 0 14px var(--glow)}
.step-line{width:20px;height:1.5px;background:var(--s3)}

/* PHASES */
.phase{display:none}
.phase.active{display:block}

/* WARDROBE */
.wardrobe{max-width:920px;margin:0 auto;padding:0 1rem 3rem}
.sec-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold) 0%,transparent 100%)}

/* AVATAR */
.stage{display:flex;gap:2rem;align-items:flex-start;flex-wrap:wrap}
.avatar-wrap{flex-shrink:0;width:170px;position:sticky;top:1rem}
.avatar-card{background:linear-gradient(160deg,var(--s2),var(--s1));border:1px solid var(--s4);border-radius:20px;padding:1.2rem;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05)}
.av-figure{width:130px;height:220px;margin:0 auto;position:relative;border-radius:65px 65px 24px 24px;overflow:hidden;background:linear-gradient(180deg,var(--s3),var(--s2));border:1px solid var(--s4);box-shadow:inset 0 2px 8px rgba(0,0,0,.5)}
/* skin tone base */
.av-neck{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);width:14px;height:20px;background:#F0C898;border-radius:4px}
.av-hair{position:absolute;top:0;left:0;right:0;height:70px;transition:all .4s;border-radius:50px 50px 0 0}
.av-face{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:54px;height:66px;background:linear-gradient(180deg,#F5D5B0,#F0C898);border-radius:52% 52% 46% 46%;border:1.5px solid rgba(180,120,80,.2)}
.av-blush-l{position:absolute;top:36px;left:6px;width:12px;height:7px;background:rgba(232,120,120,.35);border-radius:50%;filter:blur(3px)}
.av-blush-r{position:absolute;top:36px;right:6px;width:12px;height:7px;background:rgba(232,120,120,.35);border-radius:50%;filter:blur(3px)}
.av-eyes{position:absolute;top:28px;left:50%;transform:translateX(-50%);width:38px;display:flex;justify-content:space-between;align-items:center}
.av-eye-wrap{width:10px;height:10px;position:relative}
.av-eye{width:10px;height:10px;background:#2C1A0E;border-radius:50%;position:relative}
.av-eye::after{content:'';position:absolute;top:2px;left:2px;width:3px;height:3px;background:rgba(255,255,255,.7);border-radius:50%}
.av-lash{position:absolute;top:-2px;left:1px;right:1px;height:3px;background:#1A0A04;border-radius:50% 50% 0 0;opacity:.8}
.av-brow{position:absolute;top:-6px;left:0;right:0;height:2.5px;background:#3B2314;border-radius:2px;transform:rotate(-3deg)}
.av-nose{position:absolute;top:44px;left:50%;transform:translateX(-50%);width:8px;height:6px;border-bottom:2px solid rgba(160,100,60,.4);border-left:1.5px solid transparent;border-right:1.5px solid transparent;border-radius:0 0 50% 50%}
.av-mouth{position:absolute;top:52px;left:50%;transform:translateX(-50%);width:16px;height:8px;border-bottom:2.5px solid #D05070;border-left:1.5px solid #D05070;border-right:1.5px solid #D05070;border-radius:0 0 12px 12px}
.av-body{position:absolute;bottom:55px;left:0;right:0;height:96px;transition:all .35s}
.av-accessory{position:absolute;bottom:148px;left:50%;transform:translateX(-50%);width:36px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;transition:all .35s}
.av-legs{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:54px;display:flex;gap:6px}
.av-leg{flex:1;height:40px;border-radius:4px 4px 0 0;transition:all .35s}
.av-shoes{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:60px;display:flex;gap:4px}
.av-shoe{flex:1;height:14px;border-radius:3px 3px 1px 1px;transition:all .35s;position:relative;overflow:visible}
.av-shoe.heel::after{content:'';position:absolute;bottom:0;right:4px;width:3px;height:8px;background:inherit;filter:brightness(.8);border-radius:1px}
.av-phone{position:absolute;top:68px;right:-16px;width:14px;height:24px;border-radius:4px;border:1.5px solid;display:none;box-shadow:0 2px 6px rgba(0,0,0,.5)}
.av-phone.show{display:block}
.av-phone-shine{position:absolute;top:3px;left:3px;width:3px;height:6px;background:rgba(255,255,255,.4);border-radius:1px}
.av-shine{position:absolute;top:8px;left:15px;width:8px;height:24px;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);border-radius:10px;pointer-events:none}
.avatar-name{font-size:11px;color:var(--txt3);margin-top:.6rem;letter-spacing:.08em;text-transform:uppercase}
.outfit-tags{margin-top:.6rem;display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.otag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--s3);color:var(--txt3);border:1px solid var(--s4)}

/* OPTIONS */
.options-area{flex:1;min-width:270px}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.ctab{padding:6px 14px;border-radius:24px;border:1px solid var(--s3);background:var(--s1);font-size:12px;cursor:pointer;color:var(--txt2);transition:all .2s;letter-spacing:.03em}
.ctab:hover{border-color:var(--gold);color:var(--gold)}
.ctab.active{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000;border-color:transparent;font-weight:600;box-shadow:0 2px 12px var(--glow)}
.opts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:10px}
.ocard{background:linear-gradient(160deg,var(--s2),var(--s1));border:1.5px solid var(--s3);border-radius:14px;padding:12px 8px 10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.ocard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.06),transparent);opacity:0;transition:opacity .2s;pointer-events:none}
.ocard:hover{border-color:rgba(201,168,76,.5);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.ocard:hover::before{opacity:1}
.ocard.sel{border-color:var(--gold);background:linear-gradient(160deg,rgba(201,168,76,.12),var(--s1));box-shadow:0 0 20px var(--glow)}
.ocard.sel::after{content:'✓';position:absolute;top:6px;right:8px;font-size:11px;color:var(--gold);font-weight:700}
.oicon{font-size:2rem;line-height:1;margin-bottom:5px;display:block}
.oname{font-size:11px;color:var(--txt2);line-height:1.3}

/* BUTTONS */
.action-row{text-align:center;padding:2rem 0 1rem}
.btn-p{background:linear-gradient(135deg,#C9A84C,#E09B2F);color:#000;border:none;padding:14px 36px;border-radius:32px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;letter-spacing:.04em;box-shadow:0 4px 24px var(--glow),0 0 0 1px rgba(201,168,76,.3)}
.btn-p:hover{transform:scale(1.05) translateY(-1px);box-shadow:0 8px 30px var(--glow)}
.btn-s{background:transparent;color:var(--txt2);border:1px solid var(--s3);padding:11px 26px;border-radius:32px;font-size:.9rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-s:hover{border-color:var(--txt2);color:var(--txt)}

/* BOTS */
.bots-row{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin:1rem 0}
.bot-card{background:linear-gradient(160deg,var(--s2),var(--s1));border:1.5px solid var(--s3);border-radius:18px;padding:1.2rem 1rem;text-align:center;min-width:130px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.bot-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(155,111,224,.07),transparent);opacity:0;transition:opacity .2s;pointer-events:none}
.bot-card:hover{border-color:var(--purple);transform:translateY(-4px);box-shadow:0 8px 24px rgba(155,111,224,.2)}
.bot-card:hover::after{opacity:1}
.bot-card.chal{border-color:var(--pink);background:rgba(232,84,122,.07);box-shadow:0 0 24px var(--pinkglow)}
.bot-emoji{font-size:2.4rem;display:block;margin-bottom:.5rem}
.bot-name{font-size:12px;color:var(--txt2);font-weight:500}
.bot-style{font-size:10px;color:var(--txt3);margin-top:3px}
.bot-mini-av{width:60px;height:90px;margin:0 auto .5rem;position:relative;border-radius:30px 30px 10px 10px;overflow:hidden;background:var(--s3);border:1px solid var(--s4)}

/* DUEL */
.duel-arena{max-width:920px;margin:0 auto;padding:1rem}
.vs-row{display:flex;align-items:center;gap:1rem;justify-content:center;flex-wrap:wrap;perspective:1000px}
.combatant{background:linear-gradient(160deg,var(--s2),var(--s1));border:1.5px solid var(--s3);border-radius:24px;padding:1.8rem 1.5rem;flex:1;min-width:220px;max-width:310px;text-align:center;transition:all .5s;position:relative;overflow:hidden}
.combatant::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent,rgba(201,168,76,.04),transparent,rgba(201,168,76,.04),transparent);animation:spin 8s linear infinite;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
.combatant.winner{border-color:var(--gold);box-shadow:0 0 40px var(--glow),inset 0 0 40px rgba(201,168,76,.04)}
.combatant.loser{opacity:.5;filter:grayscale(.4)}
.cname{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);margin-bottom:1rem;letter-spacing:.02em}
.c-av{width:110px;height:175px;margin:0 auto 1rem;position:relative;border-radius:55px 55px 16px 16px;overflow:hidden;background:linear-gradient(180deg,var(--s3),var(--s2));border:1.5px solid var(--s4);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.vs-badge{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#B03060);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:#fff;flex-shrink:0;box-shadow:0 0 28px var(--pinkglow),0 0 0 3px rgba(232,84,122,.2)}
.score-bar{margin-top:.8rem}
.score-lbl{font-size:11px;color:var(--txt3);margin-bottom:5px;letter-spacing:.08em;text-transform:uppercase}
.score-track{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;position:relative}
.score-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 1.2s cubic-bezier(.34,1.56,.64,1);width:0}
.score-num{font-size:1.6rem;font-weight:600;color:var(--txt);margin-top:8px;font-family:'Playfair Display',serif}

/* LIKES */
.likes-row{display:flex;justify-content:center;gap:1rem;padding:.8rem 0 0;flex-wrap:wrap}
.like-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:22px;border:1.5px solid var(--s3);background:var(--s2);cursor:pointer;color:var(--txt2);font-size:13px;transition:all .2s;font-family:'DM Sans',sans-serif;font-weight:500}
.like-btn:hover{border-color:var(--pink);color:var(--pink)}
.like-btn.liked{background:rgba(232,84,122,.12);border-color:var(--pink);color:var(--pink)}
.like-cnt{font-weight:600}

/* VERDICT */
.verdict-box{background:linear-gradient(160deg,var(--s2),var(--s1));border:1.5px solid rgba(201,168,76,.4);border-radius:22px;padding:1.8rem;max-width:620px;margin:1.5rem auto;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4),0 0 60px rgba(201,168,76,.08)}
.verdict-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--gold);margin-bottom:.8rem}
.verdict-text{color:var(--txt2);line-height:1.75;font-size:.95rem;white-space:pre-wrap;text-align:left}
.loading-wrap{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--txt2);padding:.5rem 0}
.dot-pulse{display:flex;gap:5px;align-items:center}
.dot-pulse span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse .9s ease-in-out infinite}
.dot-pulse span:nth-child(2){animation-delay:.2s}
.dot-pulse span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* CROWN */
.crown{font-size:2.2rem;display:inline-block;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* LEADERBOARD */
.lb-wrap{max-width:520px;margin:1rem auto;background:linear-gradient(160deg,var(--s2),var(--s1));border:1px solid var(--s3);border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.lb-header{padding:1rem 1.4rem;border-bottom:1px solid var(--s3);font-family:'Playfair Display',serif;color:var(--gold);font-size:1.1rem;display:flex;align-items:center;gap:8px}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--s3);font-size:13px;transition:background .2s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,255,255,.02)}
.lb-rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.lb-rank.r1{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;box-shadow:0 0 12px rgba(255,215,0,.5)}
.lb-rank.r2{background:linear-gradient(135deg,#C0C0C0,#888);color:#000}
.lb-rank.r3{background:linear-gradient(135deg,#CD7F32,#8B4513);color:#000}
.lb-rank.rn{background:var(--s3);color:var(--txt2)}
.lb-name{flex:1;color:var(--txt)}
.lb-score{color:var(--gold);font-weight:600;font-family:'Playfair Display',serif}
.lb-badge{font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px}
.lb-you{background:rgba(201,168,76,.2);color:var(--gold)}
.lb-bot{background:rgba(155,111,224,.2);color:var(--purple)}

/* SCORE BADGE on combatant */
.winner-crown{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:1.6rem;animation:float 2s ease-in-out infinite;display:none}
.combatant.winner .winner-crown{display:block}

@media(max-width:560px){
  .stage{flex-direction:column}
  .avatar-wrap{width:100%;position:relative}
  .avatar-card{display:flex;align-items:center;gap:1rem;text-align:left}
  .av-figure{width:90px;height:150px;flex-shrink:0}
  .outfit-tags{justify-content:flex-start}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <div class="logo"><span class="logo-g">GLAM</span> <span class="logo-d">Duel</span></div>
  <div class="tagline">Одевайся · Сражайся · Побеждай</div>
</div>

<div class="steps" id="stepsBar"></div>

<!-- PHASE 1: WARDROBE -->
<div class="phase active" id="phase1">
<div class="wardrobe">
  <div class="sec-title">✨ Создай свой образ</div>
  <div class="stage">
    <div class="avatar-wrap">
      <div class="avatar-card">
        <div class="av-figure" id="mainAv">
          <div class="av-shine"></div>
          <div class="av-neck"></div>
          <div class="av-hair" id="av-hair" style="background:#3B2314"></div>
          <div class="av-face">
            <div class="av-blush-l"></div><div class="av-blush-r"></div>
            <div class="av-eyes">
              <div class="av-eye-wrap"><div class="av-brow"></div><div class="av-eye"><div class="av-lash"></div></div></div>
              <div class="av-eye-wrap"><div class="av-brow"></div><div class="av-eye"><div class="av-lash"></div></div></div>
            </div>
            <div class="av-nose"></div>
            <div class="av-mouth"></div>
          </div>
          <div class="av-accessory" id="av-acc"></div>
          <div class="av-body" id="av-body" style="background:#7B5EA7"></div>
          <div class="av-legs">
            <div class="av-leg" id="av-leg-l" style="background:#F0C898"></div>
            <div class="av-leg" id="av-leg-r" style="background:#F0C898"></div>
          </div>
          <div class="av-shoes">
            <div class="av-shoe" id="av-shoe-l" style="background:#2a2a2a"></div>
            <div class="av-shoe" id="av-shoe-r" style="background:#2a2a2a"></div>
          </div>
          <div class="av-phone" id="av-phone"><div class="av-phone-shine"></div></div>
        </div>
        <div class="avatar-name">Ваш образ</div>
        <div class="outfit-tags" id="outfitTags"></div>
      </div>
    </div>
    <div class="options-area">
      <div class="cat-tabs" id="catTabs"></div>
      <div class="opts-grid" id="optsGrid"></div>
    </div>
  </div>
  <div class="action-row">
    <button class="btn-p" onclick="goPhase2()">Выйти на подиум →</button>
  </div>
</div>
</div>

<!-- PHASE 2: CHOOSE BOT -->
<div class="phase" id="phase2">
<div class="duel-arena">
  <div class="sec-title" style="justify-content:center">🤺 Выбери соперника</div>
  <div class="bots-row" id="botsRow"></div>
  <div class="action-row">
    <button class="btn-s" onclick="showPhase(1)">← Назад</button>
  </div>
</div>
</div>

<!-- PHASE 3: DUEL -->
<div class="phase" id="phase3">
<div class="duel-arena">
  <div class="sec-title" style="justify-content:center">👑 Дуэль стилей</div>
  <div class="vs-row">
    <div class="combatant" id="c-you">
      <div class="winner-crown">👑</div>
      <div class="cname">Ты</div>
      <div class="c-av" id="duel-you"></div>
      <div class="score-bar">
        <div class="score-lbl">Оценка</div>
        <div class="score-track"><div class="score-fill" id="sf-you"></div></div>
        <div class="score-num" id="sn-you">—</div>
      </div>
      <div class="likes-row">
        <button class="like-btn" id="lb-fire" onclick="like('fire')">🔥 <span class="like-cnt" id="lc-fire">0</span></button>
        <button class="like-btn" id="lb-heart" onclick="like('heart')">❤️ <span class="like-cnt" id="lc-heart">0</span></button>
      </div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="combatant" id="c-bot">
      <div class="winner-crown">👑</div>
      <div class="cname" id="bot-name-disp">Bot</div>
      <div class="c-av" id="duel-bot"></div>
      <div class="score-bar">
        <div class="score-lbl">Оценка</div>
        <div class="score-track"><div class="score-fill" id="sf-bot"></div></div>
        <div class="score-num" id="sn-bot">—</div>
      </div>
    </div>
  </div>
  <div class="verdict-box" id="verdictBox" style="display:none">
    <div class="verdict-title" id="verdictTitle">Жюри оценивает...</div>
    <div id="verdictContent">
      <div class="loading-wrap"><div class="dot-pulse"><span></span><span></span><span></span></div></div>
    </div>
  </div>
  <div class="action-row" id="nextActions" style="display:none">
    <button class="btn-p" onclick="showLeaderboard()">Таблица лидеров →</button>
    <br><br>
    <button class="btn-s" onclick="restart()">Сыграть ещё раз</button>
  </div>
</div>
</div>

<!-- PHASE 4: LEADERBOARD -->
<div class="phase" id="phase4">
<div class="duel-arena">
  <div class="lb-wrap">
    <div class="lb-header">🏆 Таблица лидеров</div>
    <div id="lbTable"></div>
  </div>
  <div class="action-row">
    <button class="btn-p" onclick="restart()">Новая игра ✨</button>
  </div>
</div>
</div>

<script>
const CATS=[
  {id:'hair',label:'💇 Причёска',opts:[
    {id:'h1',name:'Каре',icon:'💆',hairColor:'#3B2314',hairStyle:'border-radius:40px 40px 10px 10px;height:58px'},
    {id:'h2',name:'Хвост',icon:'👱',hairColor:'#B8860B',hairStyle:'border-radius:40px 40px 50% 50%;height:48px'},
    {id:'h3',name:'Кудри',icon:'💁',hairColor:'#8B0000',hairStyle:'border-radius:50% 50% 30% 30%;height:74px'},
    {id:'h4',name:'Каштан',icon:'🧑',hairColor:'#8B4513',hairStyle:'border-radius:40px 40px 0 0;height:62px'},
    {id:'h5',name:'Блонд',icon:'👩',hairColor:'#F5E060',hairStyle:'border-radius:40px 40px 0 0;height:58px'},
    {id:'h6',name:'Синий',icon:'💙',hairColor:'#1E70FF',hairStyle:'border-radius:50% 50% 0 0;height:68px'},
  ]},
  {id:'outfit',label:'👗 Одежда',opts:[
    {id:'o1',name:'Платье',icon:'👗',bodyColor:'#E8547A',legColor:'#F0C898',accColor:'rgba(232,84,122,.3)'},
    {id:'o2',name:'Деловой',icon:'👔',bodyColor:'#2C3E6B',legColor:'#1E2E5A',accColor:'rgba(255,255,255,.15)'},
    {id:'o3',name:'Спорт',icon:'🏃',bodyColor:'#E09B2F',legColor:'#3A9E6A',accColor:'rgba(64,194,120,.3)'},
    {id:'o4',name:'Джинсы',icon:'👖',bodyColor:'#4B7FC5',legColor:'#2B5090',accColor:'rgba(255,255,255,.1)'},
    {id:'o5',name:'Вечернее',icon:'✨',bodyColor:'#1A0B2E',legColor:'#F0C898',accColor:'rgba(201,168,76,.25)'},
    {id:'o6',name:'Летнее',icon:'🌸',bodyColor:'#FFB6C1',legColor:'#F0C898',accColor:'rgba(255,182,193,.4)'},
  ]},
  {id:'shoes',label:'👟 Обувь',opts:[
    {id:'s1',name:'Кроссовки',icon:'👟',shoeColor:'#EFEFEF',isHeel:false},
    {id:'s2',name:'Каблуки',icon:'👠',shoeColor:'#E8547A',isHeel:true},
    {id:'s3',name:'Ботинки',icon:'🥾',shoeColor:'#4B3728',isHeel:false},
    {id:'s4',name:'Кеды',icon:'👟',shoeColor:'#222222',isHeel:false},
    {id:'s5',name:'Мюли',icon:'🩴',shoeColor:'#C9A84C',isHeel:true},
    {id:'s6',name:'Угги',icon:'🦮',shoeColor:'#C4A882',isHeel:false},
  ]},
  {id:'phone',label:'📱 Телефон',opts:[
    {id:'p1',name:'iPhone',icon:'📱',phoneBg:'#1A1A1A',phoneBorder:'#555'},
    {id:'p2',name:'Samsung',icon:'📲',phoneBg:'#0A3D5E',phoneBorder:'#1E90FF'},
    {id:'p3',name:'Без',icon:'🙅',phoneBg:null},
    {id:'p4',name:'Розовый',icon:'💗',phoneBg:'#E8547A',phoneBorder:'#FFB6C1'},
    {id:'p5',name:'Золотой',icon:'✨',phoneBg:'#C9A84C',phoneBorder:'#F0D080'},
  ]},
];
const BOTS=[
  {id:'b1',name:'StyleBot 9000',emoji:'🤖',style:'Гламур',picks:{hair:'h5',outfit:'o5',shoes:'s2',phone:'p5'}},
  {id:'b2',name:'FashionAI',emoji:'👾',style:'Спортшик',picks:{hair:'h2',outfit:'o3',shoes:'s1',phone:'p2'}},
  {id:'b3',name:'TrendBot',emoji:'🦾',style:'Офис',picks:{hair:'h4',outfit:'o2',shoes:'s3',phone:'p1'}},
  {id:'b4',name:'VogueBot',emoji:'💅',style:'Романтика',picks:{hair:'h3',outfit:'o6',shoes:'s5',phone:'p4'}},
];

let sel={hair:null,outfit:null,shoes:null,phone:null};
let activeCat='hair';
let chosenBot=null;
let likes={fire:0,heart:0};let likedBtns={};
let uScore=0,bScore=0;
let lbData=[];

function buildSteps(){
  const bar=document.getElementById('stepsBar');bar.innerHTML='';
  const labels=['1','2','3','4','5','★'];
  labels.forEach((l,i)=>{
    if(i>0){const line=document.createElement('div');line.className='step-line';bar.appendChild(line);}
    const d=document.createElement('div');d.className='step-dot';d.id='sd'+i;d.textContent=l;bar.appendChild(d);
  });
}
function updateSteps(){
  const cats=['hair','outfit','shoes','phone'];
  let done=0;
  cats.forEach((c,i)=>{const d=document.getElementById('sd'+i);if(!d)return;if(sel[c]){d.className='step-dot done';done++}else if(i===done){d.className='step-dot active'}else{d.className='step-dot'}});
}
function buildTabs(){
  const tb=document.getElementById('catTabs');tb.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');b.className='ctab'+(c.id===activeCat?' active':'');
    b.textContent=c.label;b.onclick=()=>{activeCat=c.id;buildTabs();buildGrid()};
    tb.appendChild(b);
  });
}
function buildGrid(){
  const g=document.getElementById('optsGrid');g.innerHTML='';
  const cat=CATS.find(c=>c.id===activeCat);
  cat.opts.forEach(o=>{
    const d=document.createElement('div');
    d.className='ocard'+(sel[activeCat]===o.id?' sel':'');
    d.innerHTML=`<span class="oicon">${o.icon}</span><div class="oname">${o.name}</div>`;
    d.onclick=()=>{sel[activeCat]=o.id;buildGrid();updateAvatar();};
    g.appendChild(d);
  });
}
function updateAvatar(){
  const h=sel.hair?CATS[0].opts.find(x=>x.id===sel.hair):null;
  const o=sel.outfit?CATS[1].opts.find(x=>x.id===sel.outfit):null;
  const s=sel.shoes?CATS[2].opts.find(x=>x.id===sel.shoes):null;
  const p=sel.phone?CATS[3].opts.find(x=>x.id===sel.phone):null;
  if(h){const hair=document.getElementById('av-hair');hair.style.cssText='background:'+h.hairColor+';'+h.hairStyle}
  if(o){
    document.getElementById('av-body').style.background=o.bodyColor;
    document.getElementById('av-leg-l').style.background=o.legColor;
    document.getElementById('av-leg-r').style.background=o.legColor;
    document.getElementById('av-acc').style.background=o.accColor||'rgba(255,255,255,.1)';
  }
  if(s){
    const sl=document.getElementById('av-shoe-l'),sr=document.getElementById('av-shoe-r');
    sl.style.background=s.shoeColor;sr.style.background=s.shoeColor;
    if(s.isHeel){sl.classList.add('heel');sr.classList.add('heel')}else{sl.classList.remove('heel');sr.classList.remove('heel')}
  }
  const ph=document.getElementById('av-phone');
  if(p&&p.phoneBg){ph.className='av-phone show';ph.style.background=p.phoneBg;ph.style.borderColor=p.phoneBorder||'#555';}
  else{ph.className='av-phone';}
  updateOutfitTags();updateSteps();
}
function updateOutfitTags(){
  const tags=document.getElementById('outfitTags');tags.innerHTML='';
  const names={hair:'💇',outfit:'👗',shoes:'👟',phone:'📱'};
  Object.keys(sel).forEach(k=>{
    if(sel[k]){
      const cat=CATS.find(c=>c.id===k);const opt=cat.opts.find(o=>o.id===sel[k]);
      const span=document.createElement('span');span.className='otag';span.textContent=opt.name;
      tags.appendChild(span);
    }
  });
}
function makeAvatarHTML(picks,size='normal'){
  const scale=size==='small'?0.65:1;
  const h=CATS[0].opts.find(x=>x.id===picks.hair)||CATS[0].opts[0];
  const o=CATS[1].opts.find(x=>x.id===picks.outfit)||CATS[1].opts[0];
  const s=CATS[2].opts.find(x=>x.id===picks.shoes)||CATS[2].opts[0];
  const p=picks.phone&&picks.phone!=='p3'?CATS[3].opts.find(x=>x.id===picks.phone):null;
  return`
<div style="position:absolute;inset:0">
  <div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05),transparent);pointer-events:none"></div>
  <div style="position:absolute;top:0;left:0;right:0;height:${size==='small'?'38px':'56px'};background:${h.hairColor};${h.hairStyle||'border-radius:40px 40px 0 0'}"></div>
  <div style="position:absolute;top:${size==='small'?'12px':'18px'};left:50%;transform:translateX(-50%);width:${size==='small'?'36px':'48px'};height:${size==='small'?'44px':'58px'};background:linear-gradient(180deg,#F5D5B0,#F0C898);border-radius:52% 52% 46% 46%;border:1px solid rgba(180,120,80,.2)">
    <div style="position:absolute;top:${size==='small'?'10px':'14px'};left:50%;transform:translateX(-50%);width:${size==='small'?'26px':'34px'};display:flex;justify-content:space-between">
      <div style="width:${size==='small'?'6px':'8px'};height:${size==='small'?'6px':'8px'};background:#2C1A0E;border-radius:50%;position:relative"><div style="position:absolute;top:1px;left:1px;width:2px;height:2px;background:rgba(255,255,255,.7);border-radius:50%"></div></div>
      <div style="width:${size==='small'?'6px':'8px'};height:${size==='small'?'6px':'8px'};background:#2C1A0E;border-radius:50%;position:relative"><div style="position:absolute;top:1px;left:1px;width:2px;height:2px;background:rgba(255,255,255,.7);border-radius:50%"></div></div>
    </div>
    <div style="position:absolute;top:${size==='small'?'29px':'38px'};left:50%;transform:translateX(-50%);width:${size==='small'?'10px':'13px'};height:${size==='small'?'5px':'7px'};border-bottom:2px solid #D05070;border-left:1.5px solid #D05070;border-right:1.5px solid #D05070;border-radius:0 0 10px 10px"></div>
  </div>
  <div style="position:absolute;bottom:${size==='small'?'30px':'40px'};left:0;right:0;height:${size==='small'?'58px':'76px'};background:${o.bodyColor}"></div>
  <div style="position:absolute;bottom:${size==='small'?'12px':'18px'};left:50%;transform:translateX(-50%);width:${size==='small'?'40px':'54px'};display:flex;gap:${size==='small'?'4px':'6px'}">
    <div style="flex:1;height:${size==='small'?'22px':'30px'};background:${o.legColor};border-radius:3px 3px 0 0"></div>
    <div style="flex:1;height:${size==='small'?'22px':'30px'};background:${o.legColor};border-radius:3px 3px 0 0"></div>
  </div>
  <div style="position:absolute;bottom:${size==='small'?'2px':'4px'};left:50%;transform:translateX(-50%);width:${size==='small'?'46px':'62px'};display:flex;gap:${size==='small'?'3px':'4px'}">
    <div style="flex:1;height:${size==='small'?'10px':'13px'};background:${s.shoeColor};border-radius:2px${s.isHeel?' 2px 1px 1px':''}"></div>
    <div style="flex:1;height:${size==='small'?'10px':'13px'};background:${s.shoeColor};border-radius:2px${s.isHeel?' 2px 1px 1px':''}"></div>
  </div>
  ${p?`<div style="position:absolute;top:${size==='small'?'48px':'62px'};right:${size==='small'?'-8px':'-14px'};width:${size==='small'?'10px':'13px'};height:${size==='small'?'16px':'22px'};background:${p.phoneBg};border:1.5px solid ${p.phoneBorder||'#555'};border-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`:''}
</div>`;
}
function buildBots(){
  const row=document.getElementById('botsRow');row.innerHTML='';
  BOTS.forEach(b=>{
    const d=document.createElement('div');d.className='bot-card';
    const mini=document.createElement('div');mini.className='bot-mini-av';mini.innerHTML=makeAvatarHTML(b.picks,'small');
    d.appendChild(mini);
    const nameEl=document.createElement('div');nameEl.className='bot-name';nameEl.textContent=b.name+' '+b.emoji;
    const styleEl=document.createElement('div');styleEl.className='bot-style';styleEl.textContent=b.style;
    d.appendChild(nameEl);d.appendChild(styleEl);
    d.onclick=()=>{
      document.querySelectorAll('.bot-card').forEach(x=>x.classList.remove('chal'));
      d.classList.add('chal');chosenBot=b;setTimeout(()=>startDuel(b),450);
    };
    row.appendChild(d);
  });
}
function goPhase2(){
  CATS.forEach(c=>{if(!sel[c.id])sel[c.id]=c.opts[Math.floor(Math.random()*c.opts.length)].id});
  updateAvatar();showPhase(2);buildBots();markStep(4);
}
function startDuel(bot){
  showPhase(3);markStep(5);
  document.getElementById('bot-name-disp').textContent=bot.name+' '+bot.emoji;
  const dyou=document.getElementById('duel-you');dyou.innerHTML=makeAvatarHTML(sel);dyou.style.position='relative';
  const dbot=document.getElementById('duel-bot');dbot.innerHTML=makeAvatarHTML(bot.picks);dbot.style.position='relative';
  const vb=document.getElementById('verdictBox');vb.style.display='block';
  document.getElementById('verdictTitle').textContent='Жюри оценивает...';
  document.getElementById('verdictContent').innerHTML='<div class="loading-wrap"><div class="dot-pulse"><span></span><span></span><span></span></div></div>';
  document.getElementById('nextActions').style.display='none';
  document.getElementById('c-you').classList.remove('winner','loser');
  document.getElementById('c-bot').classList.remove('winner','loser');
  document.getElementById('sf-you').style.width='0';document.getElementById('sf-bot').style.width='0';
  callJudge(descOutfit(sel),descOutfit(bot.picks),bot.name);
}
function descOutfit(picks){
  const h=CATS[0].opts.find(x=>x.id===picks.hair),o=CATS[1].opts.find(x=>x.id===picks.outfit),s=CATS[2].opts.find(x=>x.id===picks.shoes),p=picks.phone&&picks.phone!=='p3'?CATS[3].opts.find(x=>x.id===picks.phone):null;
  return`Причёска: ${h?h.name:'нет'}, Одежда: ${o?o.name:'нет'}, Обувь: ${s?s.name:'нет'}${p?', Телефон: '+p.name:''}`;
}
async function callJudge(myOut,botOut,botName){
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,messages:[{role:'user',content:`Ты остроумный и строгий судья fashion-конкурса. Оцени два образа по шкале 1–10. Будь ярким, используй юмор и метафоры, как настоящий модный критик.\n\nИгрок: ${myOut}\n${botName}: ${botOut}\n\nОтвечай ТОЛЬКО JSON без markdown:\n{"score_player":(1-10),"score_bot":(1-10),"verdict_player":"оценка игрока 1-2 предложения с юмором","verdict_bot":"оценка бота","winner":"player или bot","final_comment":"финальный яркий вердикт 1 предложение"}`}]})});
    const data=await res.json();
    const raw=data.content.map(i=>i.text||'').join('');
    showVerdict(JSON.parse(raw.replace(/```json|```/g,'').trim()));
  }catch(e){
    const ps=5+Math.floor(Math.random()*5),bs=5+Math.floor(Math.random()*5);
    showVerdict({score_player:ps,score_bot:bs,verdict_player:'Образ с характером и стилем!',verdict_bot:'Бот постарался, но не дотянул.',winner:ps>=bs?'player':'bot',final_comment:ps>=bs?'Игрок сияет на подиуме как звезда! 🌟':'Бот захватил трон сегодня! 🤖'});
  }
}
function showVerdict(j){
  uScore=j.score_player;bScore=j.score_bot;
  setTimeout(()=>{
    document.getElementById('sf-you').style.width=(uScore*10)+'%';
    document.getElementById('sf-bot').style.width=(bScore*10)+'%';
    document.getElementById('sn-you').textContent=uScore+'/10';
    document.getElementById('sn-bot').textContent=bScore+'/10';
  },300);
  if(j.winner==='player'){document.getElementById('c-you').classList.add('winner');document.getElementById('c-bot').classList.add('loser');}
  else{document.getElementById('c-bot').classList.add('winner');document.getElementById('c-you').classList.add('loser');}
  document.getElementById('verdictTitle').innerHTML=j.winner==='player'?'<span class="crown">👑</span> Победа!':'📊 Результаты жюри';
  document.getElementById('verdictContent').innerHTML=`<div class="verdict-text">Ваш образ: ${j.verdict_player}\n\nОбраз соперника: ${j.verdict_bot}\n\n✨ ${j.final_comment}</div>`;
  document.getElementById('nextActions').style.display='block';
  updateLb();
}
function updateLb(){
  const ex=lbData.find(r=>r.you);
  if(ex)ex.score=uScore;else lbData.push({name:'Вы',score:uScore,you:true});
  BOTS.forEach(b=>{if(!lbData.find(r=>r.name===b.name)){lbData.push({name:b.name+' '+b.emoji,score:Math.floor(4+Math.random()*5),bot:true})}});
  lbData.sort((a,b)=>b.score-a.score);
}
function showLeaderboard(){
  showPhase(4);
  const tb=document.getElementById('lbTable');tb.innerHTML='';
  lbData.slice(0,6).forEach((r,i)=>{
    const row=document.createElement('div');row.className='lb-row';
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    row.innerHTML=`<div class="lb-rank ${rc}">${i+1}</div><div class="lb-name">${r.name}${r.you?'<span class="lb-badge lb-you">Вы</span>':''}${r.bot?'<span class="lb-badge lb-bot">AI</span>':''}</div><div class="lb-score">${r.score}/10</div>`;
    tb.appendChild(row);
  });
}
function like(type){
  if(likedBtns[type])return;likedBtns[type]=true;likes[type]++;
  document.getElementById('lc-'+type).textContent=likes[type];
  document.getElementById('lb-'+type).classList.add('liked');
}
function markStep(n){for(let i=0;i<=n;i++){const d=document.getElementById('sd'+i);if(d)d.className='step-dot done'}}
function showPhase(n){
  document.querySelectorAll('.phase').forEach((p,i)=>p.classList.toggle('active',i===n-1));
  window.scrollTo({top:0,behavior:'smooth'});
}
function restart(){
  sel={hair:null,outfit:null,shoes:null,phone:null};activeCat='hair';likes={fire:0,heart:0};likedBtns={};
  buildSteps();updateAvatar();showPhase(1);buildTabs();buildGrid();
  document.getElementById('outfitTags').innerHTML='';
}

buildSteps();buildTabs();buildGrid();
</script>
</body>
</html>
